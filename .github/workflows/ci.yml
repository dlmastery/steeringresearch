name: CI

# Offline, green-able CI: ruff + mypy + the mocked pytest suite. No GPU, no real
# model, no network at test time (the tests mock model/judge/benchmarks).
on:
  push:
    branches: [master, main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-type-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Core + dev extras (pytest, datasets, scipy, ...). bitsandbytes/GPU are
          # NOT needed: the offline tests use FakeResidualLM + mocked judges.
          python -m pip install -e ".[dev]"
          python -m pip install ruff mypy

      - name: Ruff (lint)
        run: ruff check .

      - name: Mypy (type-check src/steering)
        run: mypy src/steering

      - name: Pytest (offline suite)
        env:
          HF_HUB_OFFLINE: "1"
          HF_DATASETS_OFFLINE: "1"
          TRANSFORMERS_OFFLINE: "1"
        run: pytest -q
